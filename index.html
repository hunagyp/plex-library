<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plex Library</title>
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a1a;
      --surface:   #242424;
      --surface2:  #2a2a2a;
      --surface3:  #313131;
      --border:    #3a3a3a;
      --text:      #e0e0e0;
      --text-muted:#888;
      --accent:    #e5a00d;
      --accent-dim:#c4880b;
      --link:      #6ba3d6;
      --row-hover: #323232;
      --chip-bg:   #2f2f2f;
      --chip-on:   #e5a00d;
      --chip-on-fg:#111;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    header h1 span { color: var(--text); font-weight: 300; }
    #last-updated { color: var(--text-muted); font-size: 0.8rem; }

    /* ── Tabs ── */
    nav.tabs {
      background: var(--surface);
      padding: 0 28px;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }
    nav.tabs button {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 14px 20px 11px;
      transition: color 0.15s, border-color 0.15s;
    }
    nav.tabs button:hover { color: var(--text); }
    nav.tabs button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main ── */
    main { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Stats tiles ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-tile .stat-value {
      color: var(--accent);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }
    .stat-tile .stat-label {
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Quick filters ── */
    .quickfilter-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .qf-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
    .qf-row + .qf-row { border-top: 1px dashed var(--border); margin-top: 2px; padding-top: 8px; }
    .qf-label {
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      min-width: 84px;
    }
    .chip {
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 3px 10px;
      user-select: none;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .chip:hover { border-color: var(--accent-dim); }
    .chip.active {
      background: var(--chip-on);
      border-color: var(--chip-on);
      color: var(--chip-on-fg);
      font-weight: 600;
    }
    .chip .chip-count { opacity: 0.6; font-size: 0.72rem; margin-left: 4px; }
    .chip.active .chip-count { opacity: 0.75; }
    .qf-clear {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 3px 10px;
      margin-left: auto;
    }
    .qf-clear:hover { color: var(--text); border-color: var(--accent-dim); }
    .qf-clear:disabled { opacity: 0.4; cursor: default; }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 480px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      pointer-events: none;
    }
    .controls input[type="search"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      padding: 8px 12px 8px 34px;
      transition: border-color 0.15s;
    }
    .controls input[type="search"]:focus { border-color: var(--accent); }
    .controls input[type="search"]::placeholder { color: var(--text-muted); }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .count-badge {
      color: var(--text-muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }
    label.pagesize-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    select, .columns-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 4px 10px;
      cursor: pointer;
    }
    select:focus, .columns-btn:focus { outline: 1px solid var(--accent); }

    /* ── Columns menu ── */
    .columns-wrap { position: relative; }
    .columns-panel {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      min-width: 200px;
      padding: 10px 12px;
      z-index: 20;
    }
    .columns-panel.open { display: block; }
    .columns-panel .col-title {
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .columns-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 2px;
      font-size: 0.86rem;
      cursor: pointer;
      user-select: none;
    }
    .columns-panel label:hover { color: var(--accent); }
    .columns-panel input[type="checkbox"] { accent-color: var(--accent); }
    .columns-panel .col-actions {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }
    .columns-panel .col-actions button {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.76rem;
      padding: 4px 6px;
    }
    .columns-panel .col-actions button:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { border-collapse: collapse; width: 100%; min-width: 700px; }
    thead { background: var(--surface3); position: sticky; top: 0; z-index: 1; }
    th {
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 11px 14px;
      text-align: left;
      text-transform: uppercase;
      user-select: none;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--text); }
    th.sort-active { color: var(--accent); }
    th .sort-icon { display: inline-block; margin-left: 4px; font-size: 0.7rem; opacity: 0.5; }
    th.sort-active .sort-icon { opacity: 1; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--surface2); }
    tbody tr:nth-child(odd)  { background: var(--surface); }
    tbody tr:hover { background: var(--row-hover); }

    td {
      padding: 10px 14px;
      vertical-align: middle;
      line-height: 1.4;
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.title-cell { font-weight: 500; color: #fff; min-width: 180px; cursor: help; }
    td.title-hu { color: #d5c4a1; min-width: 160px; cursor: help; }
    td.genres, td.actors, td.directors { color: var(--text-muted); font-size: 0.82rem; max-width: 220px; }
    td.langs  { font-size: 0.82rem; }
    td.subs-yes { color: #6abf69; font-weight: 600; }
    td.subs-no  { color: var(--text-muted); }

    a.imdb-link {
      background: #f5c518;
      border-radius: 3px;
      color: #000;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 5px;
      text-decoration: none;
      white-space: nowrap;
    }
    a.imdb-link:hover { background: #e0b015; }

    a.port-link {
      background: #2196a7;
      border-radius: 3px;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 5px;
      text-decoration: none;
      white-space: nowrap;
    }
    a.port-link:hover { background: #1a7a88; }
    .title-icon { margin-left: 6px; vertical-align: middle; }

    a.trailer-link {
      background: #c00;
      border-radius: 3px;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      text-decoration: none;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    a.trailer-link:hover { background: #a00; }
    a.trailer-link.search-fallback { background: #555; }
    a.trailer-link.search-fallback:hover { background: #666; }

    .empty-row td {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      font-style: italic;
    }
    #error-banner {
      display: none;
      background: #5a1a1a;
      border: 1px solid #a03030;
      border-radius: 6px;
      color: #f08080;
      margin-bottom: 20px;
      padding: 14px 18px;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .pagination button {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 5px 11px;
      transition: background 0.12s, border-color 0.12s;
    }
    .pagination button:hover:not(:disabled) { background: var(--surface3); border-color: var(--accent); }
    .pagination button:disabled { color: var(--text-muted); cursor: default; }
    .pagination button.current {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
      cursor: default;
    }
    .page-info { color: var(--text-muted); font-size: 0.82rem; padding: 0 4px; }

    /* ── Quality badges ── */
    .badge {
      display: inline-block;
      border-radius: 3px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 6px;
    }
    .badge-4k   { background: #6b3fa0; color: #e8d5ff; }
    .badge-1080 { background: #1a5c9a; color: #c8e4ff; }
    .badge-720  { background: #1a6b4a; color: #c0f0d8; }
    .badge-sd   { background: #555;    color: #ccc;    }

    /* ── Summary tooltip ── */
    #summary-tooltip {
      position: fixed;
      display: none;
      background: #1b1b1b;
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.45;
      max-width: 460px;
      padding: 10px 12px;
      pointer-events: none;
      z-index: 9999;
    }
    #summary-tooltip.visible { display: block; }
    #summary-tooltip .tt-layout { display: flex; gap: 10px; align-items: flex-start; }
    #summary-tooltip .tt-poster {
      width: 90px;
      max-height: 135px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
      background: #000;
    }
    #summary-tooltip .tt-text { flex: 1; min-width: 0; }
    #summary-tooltip .tt-title { color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    #summary-tooltip .tt-empty { color: var(--text-muted); font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>Plex <span>Library</span></h1>
  <span id="last-updated"></span>
</header>

<nav class="tabs">
  <button id="tab-movies" class="active" onclick="switchTab('movies')">🎬 Movies</button>
  <button id="tab-shows"  onclick="switchTab('shows')">📺 TV Shows</button>
</nav>

<main>
  <div id="error-banner"></div>

  <!-- Stats tiles (shared across tabs) -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- Movies panel -->
  <div id="panel-movies" class="panel active">
    <div class="quickfilter-block" id="qf-movies"></div>

    <div class="controls">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-movies" placeholder="Search movies…" autocomplete="off" />
      </div>
      <div class="controls-right">
        <span class="count-badge" id="count-movies"></span>
        <label class="pagesize-label">
          Per page:
          <select id="pagesize-movies">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
        <div class="columns-wrap">
          <button class="columns-btn" onclick="toggleColumnsMenu('movies', event)">Columns ▾</button>
          <div class="columns-panel" id="columns-panel-movies"></div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table id="table-movies">
        <thead><tr id="thead-movies"></tr></thead>
        <tbody id="tbody-movies"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination-movies"></div>
  </div>

  <!-- Shows panel -->
  <div id="panel-shows" class="panel">
    <div class="quickfilter-block" id="qf-shows"></div>

    <div class="controls">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-shows" placeholder="Search TV shows…" autocomplete="off" />
      </div>
      <div class="controls-right">
        <span class="count-badge" id="count-shows"></span>
        <label class="pagesize-label">
          Per page:
          <select id="pagesize-shows">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
        <div class="columns-wrap">
          <button class="columns-btn" onclick="toggleColumnsMenu('shows', event)">Columns ▾</button>
          <div class="columns-panel" id="columns-panel-shows"></div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table id="table-shows">
        <thead><tr id="thead-shows"></tr></thead>
        <tbody id="tbody-shows"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination-shows"></div>
  </div>
</main>

<div id="summary-tooltip"></div>

<script>
  // ── Utility formatters ──────────────────────────────────────────────────
  const DASH = '<span style="color:var(--text-muted)">—</span>';

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatResolution(res) {
    if (!res) return DASH;
    if (res >= 2160) return '<span class="badge badge-4k">4K</span>';
    if (res >= 1080) return '<span class="badge badge-1080">1080p</span>';
    if (res >= 720)  return '<span class="badge badge-720">720p</span>';
    return `<span class="badge badge-sd">${res}p</span>`;
  }

  function formatScore(score) {
    if (score === null || score === undefined) return DASH;
    const s = score.toFixed(1);
    const color = score >= 7.5 ? '#6abf69' : score >= 6 ? '#e5a00d' : '#e06060';
    return `<span style="color:${color};font-weight:600">★ ${s}</span>`;
  }

  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes >= 1e12) return (bytes / 1e12).toFixed(1) + ' TB';
    if (bytes >= 1e9)  return (bytes / 1e9).toFixed(1) + ' GB';
    if (bytes >= 1e6)  return (bytes / 1e6).toFixed(1) + ' MB';
    return (bytes / 1e3).toFixed(1) + ' KB';
  }

  function formatDuration(ms) {
    if (!ms) return DASH;
    const mins = Math.round(ms / 60000);
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return `${h}:${String(m).padStart(2, '0')}`;
  }

  function formatDurationMinutes(ms) {
    if (!ms) return DASH;
    return String(Math.round(ms / 60000));
  }

  function titleWithImdbIcon(item) {
    const title = escHtml(item.title || '');
    if (!item.imdb_id) return title;
    const href = `https://www.imdb.com/title/${encodeURIComponent(item.imdb_id)}/`;
    return `${title} <a class="imdb-link title-icon" href="${href}" target="_blank" rel="noopener" title="Open on IMDb">IMDb</a>`;
  }

  function titleHuWithPortIcon(item) {
    if (!item.title_hu) return DASH;
    const titleHu = escHtml(item.title_hu);
    const href = `https://port.hu/kereso?q=${encodeURIComponent(item.title_hu)}`;
    return `${titleHu} <a class="port-link title-icon" href="${href}" target="_blank" rel="noopener" title="Search on port.hu">port.hu</a>`;
  }

  function formatTotalHours(msTotal) {
    if (!msTotal) return '0h';
    const hours = Math.round(msTotal / 3600000);
    if (hours >= 1000) return `${(hours / 1000).toFixed(1)}k h`;
    return `${hours} h`;
  }

  function formatLangs(arr) {
    if (!arr || arr.length === 0) return DASH;
    return arr.join(', ');
  }

  function formatImdb(id) {
    if (!id) return DASH;
    return `<a class="imdb-link" href="https://www.imdb.com/title/${escHtml(id)}/" target="_blank" rel="noopener">IMDb</a>`;
  }

  function formatTrailer(item) {
    if (item.trailer_youtube_key) {
      const url = `https://www.youtube.com/watch?v=${encodeURIComponent(item.trailer_youtube_key)}`;
      return `<a class="trailer-link" href="${url}" target="_blank" rel="noopener">▶ Trailer</a>`;
    }
    // Fallback: YouTube search
    const query = encodeURIComponent(`${item.title || ''} ${item.year || ''} trailer`.trim());
    const url = `https://www.youtube.com/results?search_query=${query}`;
    return `<a class="trailer-link search-fallback" href="${url}" target="_blank" rel="noopener" title="No trailer found — search YouTube">▶ Search</a>`;
  }

  function formatSubs(v) {
    return v ? '<span class="subs-yes">Yes</span>' : '<span class="subs-no">No</span>';
  }

  function formatList(arr) {
    return (arr && arr.length) ? escHtml(arr.join(', ')) : DASH;
  }

  function debounce(fn, delay) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
  }

  // ── Column definitions ─────────────────────────────────────────────────
  // id, label, type (string/number/bool), sortable, default visible, cellClass, render
  const COLUMNS = {
    movies: [
      { id: 'title',       label: 'Name',      type: 'string', sortable: true,  defaultOn: true,  cellClass: 'title-cell', hover: 'summary_en', render: m => titleWithImdbIcon(m) },
      { id: 'title_hu',    label: 'Name (HU)', type: 'string', sortable: true,  defaultOn: true,  cellClass: 'title-hu',   hover: 'summary_hu', render: m => titleHuWithPortIcon(m) },
      { id: 'year',        label: 'Year',      type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: m => m.year ?? '—' },
      { id: 'genres',      label: 'Genre(s)',  type: 'string', sortable: true,  defaultOn: true,  cellClass: 'genres',     render: m => formatList(m.genres) },
      { id: 'directors',   label: 'Director',  type: 'string', sortable: true,  defaultOn: true,  cellClass: 'directors',  render: m => formatList(m.directors) },
      { id: 'actors',      label: 'Actors',    type: 'string', sortable: true,  defaultOn: true,  cellClass: 'actors',     render: m => formatList(m.actors) },
      { id: 'audio_languages', label: 'Languages', type: 'string', sortable: true, defaultOn: true, cellClass: 'langs',    render: m => formatLangs(m.audio_languages) },
      { id: 'has_subtitles', label: 'Subtitles', type: 'bool', sortable: true,  defaultOn: true,  render: m => formatSubs(m.has_subtitles) },
      { id: 'duration_ms', label: 'Playtime (min)', type: 'number', sortable: true, defaultOn: true, cellClass: 'num',     render: m => formatDurationMinutes(m.duration_ms) },
      { id: 'imdb_score',  label: 'Score',     type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: m => formatScore(m.imdb_score) },
      { id: 'resolution',  label: 'Quality',   type: 'number', sortable: true,  defaultOn: true,  render: m => formatResolution(m.resolution) },
      { id: 'size_bytes',  label: 'Size',      type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: m => formatSize(m.size_bytes) },
      { id: 'trailer',     label: 'Trailer',   type: 'string', sortable: false, defaultOn: true,  render: m => formatTrailer(m) },
    ],
    shows: [
      { id: 'title',       label: 'Name',      type: 'string', sortable: true,  defaultOn: true,  cellClass: 'title-cell', hover: 'summary_en', render: s => titleWithImdbIcon(s) },
      { id: 'title_hu',    label: 'Name (HU)', type: 'string', sortable: true,  defaultOn: true,  cellClass: 'title-hu',   hover: 'summary_hu', render: s => titleHuWithPortIcon(s) },
      { id: 'year',        label: 'Year',      type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: s => s.year ?? '—' },
      { id: 'seasons',     label: 'Seasons',   type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: s => s.seasons ? `${s.seasons}${s.episodes ? ' (' + s.episodes + ')' : ''}` : '—' },
      { id: 'genres',      label: 'Genre(s)',  type: 'string', sortable: true,  defaultOn: true,  cellClass: 'genres',     render: s => formatList(s.genres) },
      { id: 'actors',      label: 'Actors',    type: 'string', sortable: true,  defaultOn: true,  cellClass: 'actors',     render: s => formatList(s.actors) },
      { id: 'audio_languages', label: 'Languages', type: 'string', sortable: true, defaultOn: true, cellClass: 'langs',    render: s => formatLangs(s.audio_languages) },
      { id: 'has_subtitles', label: 'Subtitles', type: 'bool', sortable: true,  defaultOn: true,  render: s => formatSubs(s.has_subtitles) },
      { id: 'imdb_score',  label: 'Score',     type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: s => formatScore(s.imdb_score) },
      { id: 'resolution',  label: 'Quality',   type: 'number', sortable: true,  defaultOn: true,  render: s => formatResolution(s.resolution) },
      { id: 'size_bytes',  label: 'Size',      type: 'number', sortable: true,  defaultOn: true,  cellClass: 'num',        render: s => formatSize(s.size_bytes) },
      { id: 'trailer',     label: 'Trailer',   type: 'string', sortable: false, defaultOn: true,  render: s => formatTrailer(s) },
    ],
  };

  // ── State ──────────────────────────────────────────────────────────────
  const state = {
    movies: { data: [], filtered: [], sortCol: null, sortDir: 'asc', sortType: null, page: 1, pageSize: 25,
              filters: { genres: new Set(), actors: new Set(), directors: new Set() }, visible: new Set() },
    shows:  { data: [], filtered: [], sortCol: null, sortDir: 'asc', sortType: null, page: 1, pageSize: 25,
              filters: { genres: new Set(), actors: new Set(), directors: new Set() }, visible: new Set() },
  };

  // ── localStorage helpers ──────────────────────────────────────────────
  const LS_KEY = 'plexLibrary:v1';
  function loadPrefs() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
  }
  function savePrefs(p) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(p)); } catch {}
  }

  function getVisibleCols(tab) {
    const prefs = loadPrefs();
    const saved = prefs.columns?.[tab];
    if (Array.isArray(saved)) return new Set(saved);
    return new Set(COLUMNS[tab].filter(c => c.defaultOn).map(c => c.id));
  }
  function persistVisibleCols(tab) {
    const prefs = loadPrefs();
    prefs.columns = prefs.columns || {};
    prefs.columns[tab] = [...state[tab].visible];
    savePrefs(prefs);
  }

  // ── Tab switching ─────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
  }

  // ── Stats tiles ───────────────────────────────────────────────────────
  function renderStats(data) {
    const movies = data.movies || [];
    const shows  = data.shows  || [];
    const movieMs = movies.reduce((a, m) => a + (m.duration_ms || 0), 0);
    const showMs  = shows .reduce((a, s) => a + (s.duration_ms || 0), 0);
    const movieBytes = movies.reduce((a, m) => a + (m.size_bytes || 0), 0);
    const showBytes  = shows .reduce((a, s) => a + (s.size_bytes || 0), 0);
    const episodes = shows.reduce((a, s) => a + (s.episodes || 0), 0);

    const tiles = [
      { label: 'Movies',       value: movies.length.toLocaleString() },
      { label: 'TV Shows',     value: shows.length.toLocaleString() },
      { label: 'TV Episodes',  value: episodes.toLocaleString() },
      { label: 'Total Playtime', value: formatTotalHours(movieMs + showMs) },
      { label: 'Total Size',   value: formatSize(movieBytes + showBytes) },
    ];
    document.getElementById('stats-grid').innerHTML = tiles.map(t =>
      `<div class="stat-tile"><div class="stat-value">${t.value}</div><div class="stat-label">${t.label}</div></div>`
    ).join('');
  }

  // ── Quick filters ─────────────────────────────────────────────────────
  function countOccurrences(items, field) {
    const map = new Map();
    for (const it of items) {
      const vals = it[field];
      if (!Array.isArray(vals)) continue;
      for (const v of vals) {
        if (!v) continue;
        map.set(v, (map.get(v) || 0) + 1);
      }
    }
    return [...map.entries()].sort((a, b) => b[1] - a[1]);
  }

  function renderQuickFilters(tab) {
    const s = state[tab];
    const container = document.getElementById(`qf-${tab}`);
    const hasData = s.data.length > 0;
    if (!hasData) { container.innerHTML = ''; return; }

    const topGenres    = countOccurrences(s.data, 'genres').slice(0, 10);
    const topActors    = countOccurrences(s.data, 'actors').slice(0, 5);
    const topDirectors = countOccurrences(s.data, 'directors').slice(0, 5);

    const anyActive = s.filters.genres.size + s.filters.actors.size + s.filters.directors.size > 0;

    function chipRow(label, key, entries) {
      if (!entries.length) return '';
      const chips = entries.map(([val, count]) => {
        const active = s.filters[key].has(val) ? 'active' : '';
        return `<button class="chip ${active}" data-key="${key}" data-val="${escHtml(val)}">${escHtml(val)}<span class="chip-count">${count}</span></button>`;
      }).join('');
      return `<div class="qf-row"><span class="qf-label">${label}</span>${chips}</div>`;
    }

    const clearBtn = `<button class="qf-clear" onclick="clearQuickFilters('${tab}')" ${anyActive ? '' : 'disabled'}>Clear filters</button>`;

    container.innerHTML =
      chipRow(`Top 10 Genres`,    'genres',    topGenres) +
      chipRow(`Top 5 Actors`,     'actors',    topActors) +
      chipRow(`Top 5 Directors`,  'directors', topDirectors) +
      `<div class="qf-row" style="border-top:1px dashed var(--border);padding-top:8px;">${clearBtn}</div>`;

    container.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const val = btn.dataset.val;
        const set = s.filters[key];
        set.has(val) ? set.delete(val) : set.add(val);
        s.page = 1;
        render(tab);
      });
    });
  }

  function clearQuickFilters(tab) {
    const f = state[tab].filters;
    f.genres.clear(); f.actors.clear(); f.directors.clear();
    state[tab].page = 1;
    render(tab);
  }

  // ── Columns menu ──────────────────────────────────────────────────────
  function renderColumnsMenu(tab) {
    const panel = document.getElementById(`columns-panel-${tab}`);
    const visible = state[tab].visible;
    const html = [
      '<div class="col-title">Show columns</div>',
      ...COLUMNS[tab].map(c =>
        `<label><input type="checkbox" data-col="${c.id}" ${visible.has(c.id) ? 'checked' : ''}> ${escHtml(c.label)}</label>`
      ),
      `<div class="col-actions">
         <button onclick="resetColumns('${tab}')">Reset</button>
         <button onclick="showAllColumns('${tab}')">All</button>
       </div>`
    ].join('');
    panel.innerHTML = html;
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        const id = cb.dataset.col;
        if (cb.checked) state[tab].visible.add(id); else state[tab].visible.delete(id);
        // keep at least one column
        if (state[tab].visible.size === 0) {
          state[tab].visible.add(id);
          cb.checked = true;
        }
        persistVisibleCols(tab);
        renderHeader(tab);
        render(tab);
      });
    });
  }

  function toggleColumnsMenu(tab, evt) {
    evt.stopPropagation();
    const panel = document.getElementById(`columns-panel-${tab}`);
    const isOpen = panel.classList.contains('open');
    document.querySelectorAll('.columns-panel').forEach(p => p.classList.remove('open'));
    if (!isOpen) panel.classList.add('open');
  }

  function resetColumns(tab) {
    state[tab].visible = new Set(COLUMNS[tab].filter(c => c.defaultOn).map(c => c.id));
    persistVisibleCols(tab);
    renderColumnsMenu(tab);
    renderHeader(tab);
    render(tab);
  }
  function showAllColumns(tab) {
    state[tab].visible = new Set(COLUMNS[tab].map(c => c.id));
    persistVisibleCols(tab);
    renderColumnsMenu(tab);
    renderHeader(tab);
    render(tab);
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.columns-panel.open').forEach(p => p.classList.remove('open'));
  });

  // ── Header / sort ─────────────────────────────────────────────────────
  function renderHeader(tab) {
    const s = state[tab];
    const tr = document.getElementById(`thead-${tab}`);
    const cols = COLUMNS[tab].filter(c => s.visible.has(c.id));
    tr.innerHTML = cols.map(c => {
      const sortClass = c.sortable ? 'sortable' : '';
      const activeClass = s.sortCol === c.id ? 'sort-active' : '';
      const icon = !c.sortable ? '' :
        `<span class="sort-icon">${s.sortCol === c.id ? (s.sortDir === 'asc' ? '▲' : '▼') : '⇅'}</span>`;
      return `<th class="${sortClass} ${activeClass}" data-col="${c.id}" data-type="${c.type}">${escHtml(c.label)} ${icon}</th>`;
    }).join('');
    tr.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        const type = th.dataset.type;
        if (s.sortCol === col) {
          s.sortDir = s.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          s.sortCol = col;
          s.sortType = type;
          s.sortDir = 'asc';
        }
        s.page = 1;
        renderHeader(tab);
        render(tab);
      });
    });
  }

  // ── Sort / search ─────────────────────────────────────────────────────
  function sortValue(item, col, type) {
    const val = item[col];
    if (type === 'number') return val ?? -Infinity;
    if (type === 'bool')   return val ? 1 : 0;
    if (Array.isArray(val)) return val.join(' ').toLowerCase();
    return String(val ?? '').toLowerCase();
  }

  function fieldToString(val) {
    if (val === null || val === undefined) return '';
    if (Array.isArray(val)) return val.join(' ');
    if (typeof val === 'boolean') return val ? 'yes' : 'no';
    return String(val);
  }

  function itemMatchesSearch(item, query) {
    if (!query) return true;
    // Stringify top-level fields except summary (too long) and internal ids
    const skip = new Set(['summary', 'trailer_youtube_key']);
    for (const [k, v] of Object.entries(item)) {
      if (skip.has(k)) continue;
      if (fieldToString(v).toLowerCase().includes(query)) return true;
    }
    // Also match summary (searchable, just not in primary fields loop for perf)
    if (item.summary && item.summary.toLowerCase().includes(query)) return true;
    return false;
  }

  function itemMatchesFilters(item, filters) {
    if (filters.genres.size > 0) {
      if (!(item.genres || []).some(g => filters.genres.has(g))) return false;
    }
    if (filters.actors.size > 0) {
      if (!(item.actors || []).some(a => filters.actors.has(a))) return false;
    }
    if (filters.directors.size > 0) {
      if (!(item.directors || []).some(d => filters.directors.has(d))) return false;
    }
    return true;
  }

  // ── Core render ───────────────────────────────────────────────────────
  function render(tab) {
    const s = state[tab];
    const query = document.getElementById(`search-${tab}`).value.trim().toLowerCase();

    s.filtered = s.data.filter(item => itemMatchesFilters(item, s.filters) && itemMatchesSearch(item, query));

    if (s.sortCol) {
      const col = s.sortCol;
      const type = s.sortType;
      const dir = s.sortDir === 'asc' ? 1 : -1;
      s.filtered = [...s.filtered].sort((a, b) => {
        const av = sortValue(a, col, type);
        const bv = sortValue(b, col, type);
        if (type === 'string') return dir * av.localeCompare(bv, undefined, { numeric: true });
        return dir * (av < bv ? -1 : av > bv ? 1 : 0);
      });
    }

    const totalPages = Math.max(1, Math.ceil(s.filtered.length / s.pageSize));
    if (s.page > totalPages) s.page = totalPages;

    const start = (s.page - 1) * s.pageSize;
    const rows = s.filtered.slice(start, start + s.pageSize);

    const total = s.data.length;
    const shown = s.filtered.length;
    const anyFilterOrSearch = query || s.filters.genres.size || s.filters.actors.size || s.filters.directors.size;
    document.getElementById(`count-${tab}`).textContent =
      anyFilterOrSearch ? `${shown} of ${total} results` : `${total} total`;

    const cols = COLUMNS[tab].filter(c => s.visible.has(c.id));
    const tbody = document.getElementById(`tbody-${tab}`);
    if (rows.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="${cols.length || 1}">No results found.</td></tr>`;
    } else {
      tbody.innerHTML = rows.map((item, idx) => {
        const realIdx = s.data.indexOf(item);
        return '<tr>' + cols.map(c => {
          const cls = c.cellClass || '';
          const hoverAttr = c.hover ? `data-hover="${c.hover}" data-idx="${realIdx}" data-tab="${tab}"` : '';
          return `<td class="${cls}" ${hoverAttr}>${c.render(item)}</td>`;
        }).join('') + '</tr>';
      }).join('');
    }

    renderPagination(tab, totalPages);
    renderQuickFilters(tab); // refresh to reflect active chip states
  }

  // ── Pagination ────────────────────────────────────────────────────────
  function renderPagination(tab, totalPages) {
    const s = state[tab];
    const el = document.getElementById(`pagination-${tab}`);
    if (totalPages <= 1) { el.innerHTML = ''; return; }

    const btns = [];
    btns.push(`<button ${s.page === 1 ? 'disabled' : ''} onclick="goPage('${tab}',${s.page - 1})">&#8249; Prev</button>`);

    const win = 2;
    let lo = Math.max(1, s.page - win);
    let hi = Math.min(totalPages, s.page + win);
    if (lo > 1) btns.push(`<button onclick="goPage('${tab}',1)">1</button>${lo > 2 ? '<span class="page-info">…</span>' : ''}`);
    for (let i = lo; i <= hi; i++) {
      btns.push(`<button class="${i === s.page ? 'current' : ''}" onclick="goPage('${tab}',${i})">${i}</button>`);
    }
    if (hi < totalPages) btns.push(`${hi < totalPages - 1 ? '<span class="page-info">…</span>' : ''}<button onclick="goPage('${tab}',${totalPages})">${totalPages}</button>`);

    btns.push(`<button ${s.page === totalPages ? 'disabled' : ''} onclick="goPage('${tab}',${s.page + 1})">Next &#8250;</button>`);
    el.innerHTML = btns.join('');
  }

  function goPage(tab, page) {
    state[tab].page = page;
    render(tab);
    document.getElementById(`panel-${tab}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Summary hover tooltip ─────────────────────────────────────────────
  const tooltip = document.getElementById('summary-tooltip');
  function showTooltip(item, lang) {
    let summary, title, emptyMsg, poster;
    if (lang === 'hu') {
      summary = (item.summary_hu || '').trim();
      title   = item.title_hu || item.title || '';
      emptyMsg = 'Nincs elérhető leírás.';
      poster  = item.poster_hu || item.poster_en || null;
    } else {
      summary = (item.summary || '').trim();
      title   = item.title || '';
      emptyMsg = 'No description available.';
      poster  = item.poster_en || null;
    }
    const body = summary ? escHtml(summary) : `<span class="tt-empty">${emptyMsg}</span>`;
    const posterHtml = poster
      ? `<img class="tt-poster" src="${escHtml(poster)}" alt="" onerror="this.style.display='none'" />`
      : '';
    tooltip.innerHTML =
      `<div class="tt-layout">${posterHtml}<div class="tt-text">` +
      `<div class="tt-title">${escHtml(title)}</div>${body}` +
      `</div></div>`;
    tooltip.classList.add('visible');
  }
  function hideTooltip() { tooltip.classList.remove('visible'); }
  function positionTooltip(e) {
    const pad = 14;
    const vw = window.innerWidth, vh = window.innerHeight;
    const rect = tooltip.getBoundingClientRect();
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + rect.width > vw - 10) x = e.clientX - rect.width - pad;
    if (y + rect.height > vh - 10) y = e.clientY - rect.height - pad;
    tooltip.style.left = Math.max(4, x) + 'px';
    tooltip.style.top  = Math.max(4, y) + 'px';
  }

  document.addEventListener('mouseover', (e) => {
    const td = e.target.closest('td[data-hover^="summary"]');
    if (!td) return;
    const tab = td.dataset.tab;
    const idx = parseInt(td.dataset.idx, 10);
    const item = state[tab]?.data?.[idx];
    if (!item) return;
    const lang = td.dataset.hover === 'summary_hu' ? 'hu' : 'en';
    showTooltip(item, lang);
    positionTooltip(e);
  });
  document.addEventListener('mousemove', (e) => {
    if (!tooltip.classList.contains('visible')) return;
    positionTooltip(e);
  });
  document.addEventListener('mouseout', (e) => {
    const td = e.target.closest('td[data-hover^="summary"]');
    if (td && !td.contains(e.relatedTarget)) hideTooltip();
  });
  // Clear tooltip on scroll / tab switch
  window.addEventListener('scroll', hideTooltip, true);

  // ── Init ──────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.style.display = 'block';
    el.textContent = `Failed to load data.js: ${msg}. Run fetch_plex_data.py to generate it.`;
  }

  function init(data) {
    if (data.generated_at) {
      const d = new Date(data.generated_at);
      document.getElementById('last-updated').textContent =
        'Last updated: ' + d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    }

    state.movies.data = data.movies || [];
    state.shows.data  = data.shows  || [];
    state.movies.visible = getVisibleCols('movies');
    state.shows.visible  = getVisibleCols('shows');

    renderStats(data);

    ['movies', 'shows'].forEach(tab => {
      document.getElementById(`search-${tab}`).addEventListener(
        'input', debounce(() => { state[tab].page = 1; render(tab); }, 250)
      );
      document.getElementById(`pagesize-${tab}`).addEventListener('change', e => {
        state[tab].pageSize = parseInt(e.target.value, 10);
        state[tab].page = 1;
        render(tab);
      });
      renderColumnsMenu(tab);
      renderHeader(tab);
      render(tab);
    });
  }

  if (window.PLEX_DATA) {
    init(window.PLEX_DATA);
  } else {
    showError('data.js not found or empty');
  }
</script>
